name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Default: unit tests, replay agreement, proof artifact structure, proof-run (synthetic backend only).
  # No native LSL: proof-run uses --backend synthetic by default; test_integration_synthetic_lsl.py skipped.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create venv
        run: python -m venv .venv

      - name: Upgrade pip
        run: .venv/bin/python -m pip install --upgrade pip

      - name: Install package and dev dependencies
        run: .venv/bin/python -m pip install -e .[dev]

      - name: Run tests
        run: .venv/bin/python -m pytest

  # Optional / monitoring only: native LSL integration. This job does NOT gate the workflow.
  # It monitors upstream (pylsl/liblsl) and environment compatibility. A red X here means
  # native LSL is unstable in this environment, not a LoopLab platform regression.
  test-lsl:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      RUN_LSL_TESTS: "1"
    steps:
      - name: Note — optional native LSL monitoring
        run: echo "This job monitors upstream/native LSL compatibility only. Failure here does not indicate a platform regression."

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create venv
        run: python -m venv .venv

      - name: Upgrade pip
        run: .venv/bin/python -m pip install --upgrade pip

      - name: Install package and dev dependencies
        run: .venv/bin/python -m pip install -e .[dev]

      - name: Run LSL integration tests
        run: .venv/bin/python -m pytest tests/test_integration_synthetic_lsl.py -v

      - name: Proof-run with LSL backend
        run: .venv/bin/python -m looplab proof-run --backend lsl --duration 2 --out-dir proof_run_lsl

      - name: check-lsl probe (monitoring)
        run: .venv/bin/python -m looplab check-lsl --json || true
