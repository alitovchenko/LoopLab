# LoopLab run config example (YAML)
# Use: python -m looplab run --config examples/config_example.yaml

lsl:
  name: "MyEEG"
  type: "EEG"
  chunk_size: 32
  max_buffered: 360.0
  timeout: 5.0

buffer:
  max_samples: 10000
  n_channels: 32

preprocess: "none"
feature_extractor: "simple"
model: "identity"
model_config: {}
policy: "identity"
policy_config:
  validity_seconds: 1.0

task_adapter: "psychopy"
log_path: "looplab_events.jsonl"
record_stream_path: null
benchmark: true
