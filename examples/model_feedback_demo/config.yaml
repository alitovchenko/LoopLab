# Model-based feedback demo: model output directly drives feedback type (A or B).
# log_path and record_stream_path are overridden by run_demo.py to out_dir.

lsl:
  name: "FakeEEG"
  type: "EEG"
  chunk_size: 8
  max_buffered: 360.0
  timeout: 5.0

buffer:
  max_samples: 500
  n_channels: 2

preprocess: "none"
feature_extractor: "simple"
feature_extractor_config: {}
model: "binary_feedback"
model_config:
  threshold: 0.0
policy: "feedback"
policy_config:
  validity_seconds: 1.0

task_adapter: "psychopy"
log_path: "model_feedback_events.jsonl"
record_stream_path: "model_feedback_stream.jsonl"
benchmark: true
